name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  pint:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: ./.github/actions/setup-php
      
      - name: Run Pint
        run: composer lint
    
  larastan:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        
      - uses: ./.github/actions/setup-php

      - name: Run Larastan
        run: composer analyse

  tests:
    name: Tests
    runs-on: ubuntu-latest
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: pgsql
      DB_PASSWORD: password
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: ${{ env.DB_DATABASE }}
          POSTGRES_USER: ${{ env.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
        ports: 
          - ${{ env.DB_PORT }}:5432
        options: >-
          --health-cmd="pg_isready -U ${{ env.DB_USERNAME }} -d ${{ env.DB_DATABASE }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: ./.github/actions/setup-php

      - name: Prepare environment
        run: cp .env.example .env

      - name: Generate APP Key
        run: php artisan key:generate

      - name: Run Migrations
        run: php artisan migrate --force
      
      - name: Run Pest
        run: composer test:ci
